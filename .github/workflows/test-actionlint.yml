name: Actionlint
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
permissions: {}

jobs:
  actionlint:
    name: Workflow Files
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      with:
        persist-credentials: false
    - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
      with:
        fail_level: any 
