name: Actionlint
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
permissions: {}

jobs:
  actionlint:
    name: Workflow Files
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
      with:
        fail_level: any 
